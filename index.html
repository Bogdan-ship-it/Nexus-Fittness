<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus Fitness</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body background="assets/fundal.jpg">
  <!-- Banner sus -->
  <header class="banner">
    <img src="assets/banner sus.png" alt="Nexus Fitness banner"> n
  </header>

  <!-- Bara laterală stânga -->
    <aside class="sidebar">
<a href="#meniu"><img src="assets/meniu.png" alt="Meniu" class="btn-meniu"></a>
  <a href="#mesaje"><img src="assets/mesaje.png" alt="Mesaje" class="btn-mesaje"></a>
  <a href="#profil"><img src="assets/profil.png" alt="Profilul meu" class="btn-profil"></a>
  <a href="#locatie"><img src="assets/locatie.png.png" alt="Locație" class="btn-locatie"></a>
  </aside>

  <!-- Conținut principal -->
  <main class="content">
    <h2 class="club-name">NEXUS FITNESS</h2>


  <section class="antrenori">
  <h2>Antrenorii disponibili</h2>

  <!-- Card Andrei -->
  <div class="trainer-card">
    <div class="trainer-info">
      <h3>Antrenor Andrei</h3>
      <p>★★★★★</p>
      <p>Am obținut cele mai bune rezultate de când m-am alăturat Nexus Fitness!</p>
    </div>
    <img src="assets/antrenor_1.png" alt="Antrenor Andrei" class="img-andrei">
  </div>

  <!-- Card Ana -->
  <div class="trainer-card">
    <div class="trainer-info">
      <h3>Antrenoare Ana</h3>
      <p>★★★★★</p>
      <p>Antrenamentele cu Ana sunt motivante și eficiente!</p>
    </div>
    <img src="assets/antrenoare_1.png" alt="Antrenoare Ana" class="img-ana">
  </div>
</section>


  </main>

  <!-- Social media -->
  <footer class="social">
    <a href="#">TikTok</a>
    <a href="#">Instagram</a>
    <a href="#">Facebook</a>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
