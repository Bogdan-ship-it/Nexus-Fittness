<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus Fitness</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body background="assets/fundal.jpg">
  <!-- Banner sus -->
  <header class="banner">
    <img src="assets/banner sus.png" alt="Nexus Fitness banner"> n
  </header>

  <!-- Bara laterală stânga -->
  <aside class="sidebar">
 <a href="#meniu"><img src="assets/meniu.png" alt="Meniu" class="btn-meniu"></a>
  <a href="#mesaje"><img src="assets/mesaje.png" alt="Mesaje" class="btn-mesaje"></a>
  <a href="#profil"><img src="assets/profil.png" alt="Profilul meu" class="btn-profil"></a>
  <a href="#locatie"><img src="assets/locatie.png.png" alt="Locație" class="btn-locatie"></a>
  </aside>

  <!-- Conținut principal -->
  <main class="content">
    <h2 class="club-name">NEXUS FITNESS</h2>

    <section class="antrenori">
  <h2>Antrenorii disponibili</h2>

    <!-- Testimoniale -->
    <section class="testimonials">
      <div class="testimonial">
        <p>★★★★★<br>Am obținut cele mai bune rezultate de când m-am alăturat Nexus Fitness!<br><strong>Andrei</strong></p>
      </div>
      <div class="testimonial">
        <p>★★★★★<br>Antrenorii sunt minunați și programul e extrem de motivant!<br><strong>Ana</strong></p>
      </div>
    </section>



      <div class="trainer" onclick="openTrainerProfile('andrei')">
        <img src="assets/antrenor_1.png" alt="Antrenor Andrei">
        <p>Andrei</p>
      </div>
      <div class="trainer" onclick="openTrainerProfile('ana')">
        <img src="ana.jpg" alt="Antrenoare Ana">
        <p>Ana</p>
      </div>
    </section>
  </main>

  <!-- Social media -->
  <footer class="social">
    <a href="#">TikTok</a>
    <a href="#">Instagram</a>
    <a href="#">Facebook</a>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
